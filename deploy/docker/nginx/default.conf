resolver 127.0.0.11 valid=10s ipv6=off;

upstream crest_core_backend {
  server crest-core-service:8100;
  keepalive 16;
}

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;
  absolute_redirect off;
  client_max_body_size 500m;
  charset utf-8;
  charset_types text/plain text/css application/javascript application/json;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location = /healthz {
    access_log off;
    return 204;
  }

  location ^~ /api/v1/actuator/ {
    access_log off;
    return 404;
  }

  location ^~ /api/v1/ {
    # nosemgrep: generic.nginx.security.missing-internal.missing-internal - public API reverse proxy to the fixed Docker service upstream.
    proxy_http_version 1.1;
    proxy_set_header Host crest-core-service;
    proxy_set_header X-Forwarded-Host crest-core-web;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header Connection "";
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_pass http://crest_core_backend;
  }

  location /websocket {
    # nosemgrep: generic.nginx.security.missing-internal.missing-internal - public WebSocket reverse proxy to the fixed Docker service upstream.
    # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling - only constant WebSocket upgrade headers are forwarded here.
    proxy_http_version 1.1;
    proxy_set_header Upgrade websocket;
    proxy_set_header Connection upgrade;
    proxy_set_header Host crest-core-service;
    proxy_set_header X-Forwarded-Host crest-core-web;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_pass http://crest_core_backend;
  }

  location ~ /\.(?!well-known) {
    return 404;
  }

  location ~* \.map$ {
    return 404;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?|ttf)$ {
    try_files $uri =404;
    expires 30d;
    access_log off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
