apiVersion: v1
kind: ConfigMap
metadata:
  name: crest-nginx-config
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /var/run/nginx/nginx.pid;
    events { worker_connections 4096; }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      access_log /dev/stdout;
      sendfile on;
      keepalive_timeout 65s;
      client_max_body_size 500m;
      include /etc/nginx/conf.d/*.conf;
    }
  default.conf: |
    upstream crest_backend {
      server crest-service:8100;
      keepalive 32;
    }
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;
      server_tokens off;
      absolute_redirect off;
      client_max_body_size 500m;
      charset utf-8;
      charset_types text/plain text/css application/javascript application/json;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

      location = /healthz {
        access_log off;
        return 204;
      }
      location ^~ /api/v1/actuator/ {
        access_log off;
        return 404;
      }
      location ^~ /api/v1/ {
        proxy_http_version 1.1;
        proxy_set_header Host crest-service;
        proxy_set_header X-Forwarded-Host crest-service;
        proxy_set_header X-Forwarded-Port 8100;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_pass http://crest_backend/api/v1/;
      }
      location /websocket {
        # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling - only constant WebSocket upgrade headers are forwarded here.
        proxy_http_version 1.1;
        proxy_set_header Upgrade websocket;
        proxy_set_header Connection upgrade;
        proxy_set_header Host crest-service;
        proxy_set_header X-Forwarded-Host crest-service;
        proxy_set_header X-Forwarded-Port 8100;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_pass http://crest_backend/websocket;
      }
      location ~ /\.(?!well-known) {
        return 404;
      }
      location ~* \.map$ {
        return 404;
      }
      location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?|ttf)$ {
        try_files $uri =404;
        expires 30d;
        access_log off;
      }
      location / {
        try_files $uri $uri/ /index.html;
      }
    }
