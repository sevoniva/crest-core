name: Security Gates

on:
  pull_request:
    branches:
      - main
      - dev
      - 'release/**'
  push:
    branches:
      - main
      - dev
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security:
    name: sast-sca
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: core/core-frontend/package.json

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: core/core-frontend/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.x'

      - name: Install security scanners
        run: |
          python3 -m pip install --user pipx
          mkdir -p "${RUNNER_TEMP}/bin"
          CREST_SEMGREP_INSTALL_DIR="${RUNNER_TEMP}/bin" bash scripts/install-semgrep.sh
          CREST_OSV_SCANNER_INSTALL_DIR="${RUNNER_TEMP}/bin" bash scripts/install-osv-scanner.sh
          CREST_GITLEAKS_INSTALL_DIR="${RUNNER_TEMP}/bin" bash scripts/install-gitleaks.sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Run SAST and SCA gate
        run: bash scripts/security-scan.sh

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-reports
          path: reports/security
